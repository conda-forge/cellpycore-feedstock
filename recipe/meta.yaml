{% set name = "cellpycore" %}
{% set version = "0.2.3" %}
{% set python_min = "3.13" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cellpycore-{{ version }}.tar.gz
  sha256: 2f8cee3d78b6d5049b74b5f64ee211b8d004816f31d4596522ac0ca6a2411614

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling >=1.27
  run:
    - python >={{ python_min }}
    - pandas >=2.2.3
    - polars >=1.29.0
    - pyarrow >=20.0.0

test:
  imports:
    - cellpycore
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/cellpy/cellpy-core
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Core engine for cellpy — step and cycle summarization of battery-cycling data
  doc_url: https://github.com/cellpy/cellpy-core
  dev_url: https://github.com/cellpy/cellpy-core

extra:
  recipe-maintainers:
    - jepegit
